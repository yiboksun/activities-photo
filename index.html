<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Global Leadership Diary</title>

<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#e8dfd1;
    font-family:'Noto Sans KR',sans-serif;
    color:#4e3b2a;
}

header{
    text-align:center;
    padding:40px 20px;
}

header h1{
    font-family:'Nanum Pen Script',cursive;
    font-size:60px;
}

header p{
    margin-top:10px;
    color:#7a6651;
}

.menu{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:30px;
}

.menu button{
    border:none;
    background:#d8c3a5;
    color:#4e3b2a;
    padding:10px 18px;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
}

.menu button:hover{
    transform:translateY(-2px);
}

.diary{
    position:relative;
    width:1000px;
    margin:auto;
}

.date{
    text-align:center;
    font-size:32px;
    letter-spacing:10px;
    margin-bottom:50px;
    font-family:'Noto Sans KR',sans-serif;
    font-weight:300;
}

.photo-area{
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
}

.photo-card img{
    width:600px;
    height:400px;
    object-fit:cover;
    display:block;
    border-radius:5px;
}

.location{
    text-align:center;
    margin-top:25px;
    font-size:20px;
}

.content{
    width:700px;
    margin:40px auto;

    background-image:url("100.JPG");
    background-size:100% 100%;
    background-repeat:no-repeat;

    padding:80px 90px;

    min-height:600px;
}

.stickers{
    text-align:center;
    font-size:30px;
    margin-top:25px;
}

.page-indicator{
    text-align:center;
    margin-top:30px;
    font-size:24px;
    color:#8b7355;
}

.photo-placeholder{
    width:100%;
    height:100%;
}

.notebook-bg{
    width:100%;
    display:block;
}

.notebook-content{
    position:absolute;

    top:80px;
    left:80px;

    width:840px;
}

.note{
    position:relative;
    width:500px;
    margin:40px auto;
}

.note-paper{
    width:100%;
    display:block;
}

.note-text{
    position:absolute;

    top:80px;
    left:70px;
    right:60px;

    color:#4e3b2a;

    line-height:2;
}

</style>
</head>

<body>

<header>
    <h1>Global Leadership Diary</h1>
    <p>2026.07.21 ~ 2026.07.28</p>
</header>

<div class="menu">
    <button>사전교육</button>
    <button>7/21</button>
    <button>7/22</button>
    <button>7/23</button>
    <button>7/24</button>
    <button>7/25</button>
    <button>7/26</button>
    <button>7/27</button>
    <button>7/28</button>
</div>

<div class="diary">

<img src="100.jpg" class="notebook-bg">

<div class="note">

    <img src="100.jpg" class="note-paper">

    <div class="note-text">
        <h2>Day 1</h2>

        <p>
            처음으로 해외에 도착했다.<br>
            새로운 환경을 직접 경험하며<br>
            글로벌 리더십 프로젝트의 시작을 실감할 수 있었다.
        </p>
    </div>

</div>


    <div class="page-indicator">
        ● ○ ○ ○ ○
    </div>

</div>



</body>
</html>
