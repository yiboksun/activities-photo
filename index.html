<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Global Leadership Diary</title>

<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#e8dfd1;
    font-family:'Noto Sans KR',sans-serif;
    color:#4e3b2a;
}

header{
    text-align:center;
    padding:40px 20px;
}

header h1{
    font-family:'Nanum Pen Script',cursive;
    font-size:60px;
}

header p{
    margin-top:10px;
    color:#7a6651;
}

.menu{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:30px;
}

.menu button{
    border:none;
    background:#d8c3a5;
    color:#4e3b2a;
    padding:10px 18px;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
}

.menu button:hover{
    transform:translateY(-2px);
}

.diary{
    max-width:1000px;
    margin:auto;
    background:#f3eadb;
    padding:50px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    position:relative;
}

.date{
    text-align:center;
    font-size:32px;
    letter-spacing:10px;
    margin-bottom:50px;
    font-family:'Noto Sans KR',sans-serif;
    font-weight:300;
}

.photo-area{
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
}

.photo-card{
    position:relative;
    background:#f8f4ec;
    width:650px;
    height:430px;
    border:1px solid rgba(0,0,0,0.08);

    box-shadow:
    0 8px 20px rgba(0,0,0,0.08);

    overflow:hidden;
}

.photo-card img{
    width:600px;
    height:400px;
    object-fit:cover;
    display:block;
    border-radius:5px;
}

.tape{
    position:absolute;

    width:180px;
    height:40px;

    left:50%;
    top:-15px;

    transform:
    translateX(-50%)
    rotate(-4deg);

    background:
    repeating-linear-gradient(
        90deg,
        rgba(209,184,148,.9),
        rgba(209,184,148,.9) 12px,
        rgba(221,197,163,.9) 12px,
        rgba(221,197,163,.9) 24px
    );

    opacity:.85;

    box-shadow:
    0 2px 4px rgba(0,0,0,.1);
}

.arrow{
    width:60px;
    height:60px;
    border-radius:50%;
    border:none;
    background:#d8c3a5;
    font-size:24px;
    cursor:pointer;
}

.location{
    text-align:center;
    margin-top:25px;
    font-size:20px;
}

.content{
    margin-top:30px;
    line-height:1.8;
    text-align:center;
}

.stickers{
    text-align:center;
    font-size:30px;
    margin-top:25px;
}

.page-indicator{
    text-align:center;
    margin-top:30px;
    font-size:24px;
    color:#8b7355;
}

.diary::before{
    content:"";
    position:absolute;
    inset:0;

    background:
    repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 38px,
        rgba(0,0,0,0.08) 39px,
        transparent 40px
    );

    pointer-events:none;
}

.photo-placeholder{
    width:100%;
    height:100%;

    display:flex;
    justify-content:center;
    align-items:center;

    color:#9a8b79;
    letter-spacing:8px;
    font-size:18px;

    background:
    repeating-linear-gradient(
        45deg,
        rgba(0,0,0,0.03),
        rgba(0,0,0,0.03) 10px,
        transparent 10px,
        transparent 20px
    );
}

</style>
</head>

<body>

<header>
    <h1>Global Leadership Diary</h1>
    <p>2026.07.21 ~ 2026.07.28</p>
</header>

<div class="menu">
    <button>사전교육</button>
    <button>7/21</button>
    <button>7/22</button>
    <button>7/23</button>
    <button>7/24</button>
    <button>7/25</button>
    <button>7/26</button>
    <button>7/27</button>
    <button>7/28</button>
</div>

<div class="diary">

    <div class="date">
        2026 / 07 / 21
    </div>

    <div class="photo-area">

        <button class="arrow">◀</button>

        <div class="photo-card">

            <div class="tape"></div>

            <div class="photo-placeholder">
    PHOTO
</div>

        </div>

        <button class="arrow">▶</button>

    </div>

    <div class="location">
        United States of America
    </div>

    <div class="content">

        <h2>Day 1</h2>

        <br>

        처음으로 해외에 도착했다.<br>
        새로운 환경을 직접 경험하며<br>
        글로벌 리더십 프로젝트의 시작을 실감할 수 있었다.

    </div>


    <div class="page-indicator">
        ● ○ ○ ○ ○
    </div>

</div>

</body>
</html>
