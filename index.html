<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Leadership Journal</title>

<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#efe6d7;
font-family:'Pretendard',sans-serif;
color:#4a3728;
overflow-x:hidden;
}

/* 배경 종이 느낌 */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/paper-fibers.png");
opacity:0.35;
z-index:-1;
}

/* 메인 */

.container{
max-width:1000px;
margin:auto;
padding:60px 20px;
}

/* 날짜 */

.date{
font-family:'Marcellus',serif;
font-size:4rem;
letter-spacing:4px;
margin-bottom:10px;
}

.day{
font-size:1rem;
letter-spacing:5px;
margin-bottom:50px;
opacity:.7;
}

/* 다꾸 종이 */

.paper{
background:#f8f2e8;
padding:40px;
position:relative;
box-shadow:
0 8px 20px rgba(0,0,0,.08);
}

/* 마스킹 테이프 */

.tape{
width:140px;
height:35px;
background:rgba(214,193,158,.6);
position:absolute;
top:-15px;
left:50%;
transform:translateX(-50%) rotate(-3deg);
backdrop-filter:blur(2px);
box-shadow:0 2px 4px rgba(0,0,0,.08);
}

/* 사진 영역 */

.photo-wrap{
position:relative;
margin-bottom:70px;
}

.main-photo{
width:70%;
display:block;
border:12px solid white;
box-shadow:0 8px 15px rgba(0,0,0,.12);
}

.sub-photo{
position:absolute;
width:240px;
right:0;
bottom:-50px;
border:10px solid white;
transform:rotate(6deg);
box-shadow:0 8px 15px rgba(0,0,0,.12);
}

/* 제목 */

.section-title{
font-family:'Marcellus',serif;
font-size:2rem;
margin-bottom:20px;
}

/* 내용 */

.story{
line-height:2;
font-size:1rem;
margin-bottom:50px;
}

/* 스티커 느낌 */

.sticker{
display:inline-block;
padding:10px 20px;
background:#d7c2a3;
border-radius:30px;
margin-right:10px;
font-size:.9rem;
transform:rotate(-4deg);
}

/* 메모 카드 */

.note{
margin-top:40px;
background:#f3eadc;
padding:25px;
border-left:5px solid #b4946d;
line-height:1.9;
}

/* 이동 버튼 */

.nav{
margin-top:60px;
display:flex;
justify-content:space-between;
}

.nav a{
text-decoration:none;
color:#4a3728;
font-size:1.1rem;
transition:.3s;
}

.nav a:hover{
transform:translateY(-3px);
}

@media(max-width:768px){

.date{
font-size:2.5rem;
}

.main-photo{
width:100%;
}

.sub-photo{
position:relative;
width:70%;
margin-top:20px;
right:auto;
bottom:auto;
}

.paper{
padding:25px;
}

}

</style>
</head>
<body>

<div class="container">

<div class="date">21 JUL 2026</div>
<div class="day">DAY 1</div>

<div class="paper">

<div class="tape"></div>

<div class="photo-wrap">

<img
class="main-photo"
src="https://images.unsplash.com/photo-1527631746610-bca00a040d60"
>

<img
class="sub-photo"
src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
>

</div>

<h2 class="section-title">Today Story</h2>

<p class="story">
글로벌 리더십 프로그램 첫날.
현지 학생들과 처음 만나며 서로의 문화를 소개하는 시간을 가졌다.
처음에는 긴장했지만 함께 활동하면서 자연스럽게 친해질 수 있었다.
</p>

<div>

<span class="sticker">#Leadership</span>
<span class="sticker">#Global</span>
<span class="sticker">#Singapore</span>

</div>

<div class="note">

<b>Reflection</b><br><br>

다른 나라 학생들과 소통하면서 영어 실력보다
적극적으로 대화하려는 태도가 더 중요하다는 것을 느꼈다.

</div>

<div class="nav">

<a href="#">← Previous Day</a>
<a href="#">Next Day →</a>

</div>

</div>

</div>

</body>
</html>
