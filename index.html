<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Global Leadership Diary</title>

<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f7f1e7;
    font-family:'Noto Sans KR',sans-serif;
    color:#4e3b2a;
}

header{
    text-align:center;
    padding:40px 20px;
}

header h1{
    font-family:'Nanum Pen Script',cursive;
    font-size:72px;
    letter-spacing:2px;
}

header p{
    margin-top:10px;
    color:#7a6651;
}

.menu{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:30px;
}

.menu button{
    border:none;
    background:#d8c3a5;
    color:#4e3b2a;
    padding:10px 18px;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
}

.menu button:hover{
    transform:translateY(-2px);
}

.diary{
    max-width:1000px;
    margin:auto;
    background:#fffdf8;
    padding:40px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.date{
    text-align:center;
    font-size:38px;
    letter-spacing:5px;
    margin-bottom:40px;
    font-family:'Nanum Pen Script',cursive;
}

.photo-area{
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
}

.photo-card{
    position:relative;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 8px 20px rgba(0,0,0,0.12);
    transform:rotate(-2deg);
}

.photo-card img{
    width:300px;
    height:auto;
}

.tape{
    position:absolute;
    width:140px;
    height:35px;
    background:#b89567;
    opacity:0.7;
    top:-15px;
    left:50%;
    transform:translateX(-50%) rotate(-3deg);
}

.arrow{
    width:60px;
    height:60px;
    border-radius:50%;
    border:none;
    background:#d8c3a5;
    font-size:24px;
    cursor:pointer;
}

.location{
    text-align:center;
    margin-top:25px;
    font-size:20px;
}

.content{
    margin-top:30px;
    line-height:2;
    text-align:center;
    font-family:'Gaegu',cursive;
    font-size:28px;
}

.stickers{
    text-align:center;
    font-size:30px;
    margin-top:25px;
}

.page-indicator{
    text-align:center;
    margin-top:30px;
    font-size:24px;
    color:#8b7355;
}

.diary{
    max-width:1000px;
    margin:auto;

    background-image:url("100.JPG");
    background-size:100% 100%;
    background-repeat:no-repeat;

    padding:40px;
    border-radius:25px;
}

</style>
</head>

let currentDay = "pre";
let currentPhoto = 0;

function render(){

const data = diaryData[currentDay];

const photo =
data.photos[currentPhoto];

document.getElementById("date").innerText =
data.date;

document.getElementById("location").innerText =
data.location;

document.getElementById("mainPhoto").src =
photo.image;

document.getElementById("content").innerHTML =
`
<h2>${photo.title}</h2>
${photo.text}
`;

let dots = "";

for(let i = 0; i < data.photos.length; i++){

    if(i === currentPhoto){
        dots += "● ";
    }else{
        dots += "○ ";
    }

}

document.getElementById("pageIndicator").innerHTML = dots;

}

function changeDay(day){

currentDay = day;
currentPhoto = 0;

render();

}

function nextPhoto(){

const photos =
diaryData[currentDay].photos;

if(currentPhoto < photos.length - 1){

currentPhoto++;

render();

}

}

function prevPhoto(){

if(currentPhoto > 0){

currentPhoto--;

render();

}

}

render();
